<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Health Assessment — {{PATIENT_NAME}}</title>
<style>
  @page { margin: 0.75in; }
  body { font-family: Georgia, 'Times New Roman', serif; font-size: 11pt; line-height: 1.5; color: #1a1a1a; max-width: 7in; margin: 0 auto; }
  h1 { font-size: 20pt; border-bottom: 3px solid #2c5282; padding-bottom: 8px; margin-bottom: 4px; color: #1a365d; }
  .subtitle { font-size: 11pt; color: #555; margin-bottom: 24px; }
  h2 { font-size: 15pt; color: #2c5282; border-bottom: 1px solid #bee3f8; padding-bottom: 4px; margin-top: 28px; }
  h3 { font-size: 12pt; color: #2b6cb0; margin-top: 20px; margin-bottom: 8px; }
  h4 { font-size: 11pt; color: #2c5282; margin-top: 16px; margin-bottom: 6px; }
  table { border-collapse: collapse; width: 100%; margin: 10px 0 16px 0; font-size: 10pt; }
  th { background: #ebf8ff; color: #2c5282; text-align: left; padding: 6px 10px; border: 1px solid #bee3f8; }
  td { padding: 5px 10px; border: 1px solid #e2e8f0; }
  tr:nth-child(even) { background: #f7fafc; }
  .highlight { color: #c53030; font-weight: bold; }
  .good { color: #276749; font-weight: bold; }
  ul { margin: 6px 0; padding-left: 22px; }
  li { margin-bottom: 4px; }
  .disclaimer { background: #fffbeb; border: 1px solid #f6e05e; border-radius: 6px; padding: 12px 16px; font-size: 9.5pt; color: #744210; margin: 20px 0; }
  .section-urgent { border-left: 4px solid #e53e3e; padding-left: 12px; }
  .section-short { border-left: 4px solid #dd6b20; padding-left: 12px; }
  .section-ongoing { border-left: 4px solid #2b6cb0; padding-left: 12px; }
  .summary-box { background: #ebf8ff; border: 1px solid #90cdf4; border-radius: 6px; padding: 14px 18px; margin: 16px 0; }
  .bottom-line { background: #f0fff4; border: 1px solid #9ae6b4; border-radius: 6px; padding: 14px 18px; margin: 20px 0; }
  .page-break { page-break-before: always; }
  .footer { margin-top: 40px; border-top: 1px solid #ccc; padding-top: 10px; font-size: 8.5pt; color: #888; text-align: center; }
</style>
</head>
<body>
{{REPORT_BODY}}
</body>
</html>
